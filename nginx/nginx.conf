upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name 77.95.206.95;
    # Handle CORS preflight requests here to avoid redirecting OPTIONS (preflight)
    # and redirect other requests to HTTPS on host:8082 (mapped to container's 443).
    client_max_body_size 50M;

    # Serve static/media on HTTP as well (useful for healthchecks)
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    # Redirect all other HTTP requests to HTTPS (same host)
    location / {
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Cache-Control';

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
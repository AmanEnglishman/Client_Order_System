{% extends 'crm/base.html' %}

{% block content %}
    <div class="page-header">
        <div>
            <h2 class="page-title">Вход</h2>
            <p class="page-note">Введите свои данные для доступа в CRM.</p>
        </div>
    </div>
    <div class="card">
        {% if form.errors %}
            <div class="alert">Неверный логин или пароль. Попробуйте снова.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Логин</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Пароль</label>
                {{ form.password }}
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Войти</button>
                <a class="btn btn-outline" href="{% url 'register' %}">Регистрация</a>
            </div>
        </form>
    </div>
{% endblock %}
